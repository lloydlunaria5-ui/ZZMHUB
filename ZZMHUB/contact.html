<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZZMHUB - Contact Us</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #ffffff; }
  </style>
</head>
<body>
  <div class="bg-white shadow-lg">
    
    <header class="bg-gradient-to-r from-gray-800 to-gray-900 text-white">
      <div class="container mx-auto px-6 py-4 flex items-center justify-between">
        <div class="text-2xl">
          zzm<span class="font-light">hub</span>
        </div>

        <div class="flex-1 max-w-xl mx-8">
          <div class="relative">
            <input type="text" placeholder="Search..." class="w-full px-4 py-2 rounded-full bg-white text-gray-800 pr-12">
            <button class="absolute right-2 top-1/2 -translate-y-1/2 bg-blue-600 text-white px-4 py-1 rounded-full text-sm">Search</button>
          </div>
        </div>

        <div class="flex items-center gap-6">
          <div class="flex items-center gap-2">
            <div class="bg-blue-600 rounded-full p-2 relative">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5">
                <circle cx="8" cy="21" r="1"></circle>
                <circle cx="19" cy="21" r="1"></circle>
                <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path>
              </svg>
              <span class="absolute -top-1 -right-1 bg-red-500 text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
            </div>
            <span>₱ 0.00</span>
          </div>
          <span class="text-sm">Login / Register</span>
        </div>
      </div>

      <nav class="bg-black">
        <div class="container mx-auto px-6 py-3 flex justify-around text-sm">
          <a href="home.html" class="hover:text-blue-400 ">HOME</a>
          <a href="products.html" class="hover:text-blue-400 ">PRODUCTS</a>
          <a href="about.html" class="hover:text-blue-400 ">ABOUT US</a>
          <a href="pricelist.html" class="hover:text-blue-400 ">PRICE LIST</a>
          <a href="contact.html" class="hover:text-blue-400 underline">CONTACT US</a>
        </div>
      </nav>
    </header>
  
    
    <main class="container mx-auto px-6 py-8 max-w-2xl">
      <h1 class="text-3xl mb-8 text-center">Contact Us</h1>
      <div class="space-y-4">
        <div>
          <label class="block mb-2">Name</label>
          <input type="text" placeholder="Your name" class="w-full px-4 py-2 border border-gray-300 rounded">
        </div>
        <div>
          <label class="block mb-2">Email</label>
          <input type="email" placeholder="Your email" class="w-full px-4 py-2 border border-gray-300 rounded">
        </div>
        <div>
          <label class="block mb-2">Mobile</label>
          <input type="tel" placeholder="Your contact" class="w-full px-4 py-2 border border-gray-300 rounded">
        </div>
        <div>
          <label class="block mb-2">Message / Suggestion / Comments</label>
          <textarea placeholder="Your message" rows="5" class="w-full px-4 py-2 border border-gray-300 rounded"></textarea>
        </div>
        <button class="bg-blue-600 text-white px-8 py-2 rounded hover:bg-blue-700">Send</button>
      </div>
    </main>
  
    
    <footer class="bg-gray-900 text-white mt-12">
      <div class="container mx-auto px-6 py-8">
        <div class="grid grid-cols-3 gap-8">
          <div>
            <h3 class="mb-4">ADDRESS</h3>
            <p class="text-sm text-gray-400">Branches</p>
          </div>
          <div>
            <h3 class="mb-4">SITEMAP</h3>
            <ul class="space-y-2 text-sm text-gray-400">
              <li>Home</li>
              <li>System Builder</li>
              <li>Featured Builds</li>
              <li>Completed Builds</li>
              <li>Browse Products</li>
              <li>Contact Us</li>
            </ul>
          </div>
          <div class="text-right">
            <div class="text-2xl mb-4">zzm<span class="font-light">hub</span></div>
            <p class="text-xs text-gray-400">Copyright © 2019-2026 ZZMHUB. All rights reserved.</p>
          </div>
        </div>
      </div>
    </footer>
  
  </div>
</body>
</html>
